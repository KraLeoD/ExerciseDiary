name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # 1. Change the runner to a native ARM64 machine!
    runs-on: ubuntu-24.04-arm 
    permissions:
      packages: write
      contents: read
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. We removed the QEMU step because we are no longer emulating.
    # 3. We keep Buildx as it's just a great, modern builder.
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Convert repo name to lowercase
      run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

    - name: Build and Push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ghcr.io/${{ env.REPO_LC }}:latest
        # 4. We don't need the 'platforms' flag anymore since the machine builds for its own native architecture.